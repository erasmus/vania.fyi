<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vânia</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23faf8f4'/%3E%3Ctext x='50%25' y='50%25' dy='.1em' text-anchor='middle' dominant-baseline='middle' font-family='Cormorant Garamond, Iowan Old Style, Georgia, serif' font-weight='300' font-size='56' fill='%231a1a1a'%3EV%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #faf8f4;
    --muted: #6b6258;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 2.5rem 1.5rem;
    font-family: "Inter", system-ui, sans-serif;
    font-weight: 300;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  h1 {
    font-family: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
    font-weight: 300;
    font-size: clamp(5rem, 18vw, 11rem);
    line-height: 1;
    letter-spacing: -0.01em;
    margin: 0 0 1.25rem;
  }
  .role {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0;
  }
  .role span {
    margin: 0 0.55em;
    opacity: 0.4;
  }
  footer {
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid rgba(107, 98, 88, 0.3);
    padding-bottom: 2px;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  footer a:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }
</style>
</head>
<body>
  <main>
    <h1>Vânia</h1>
    <p class="role">Researcher<span>·</span>Speaker<span>·</span>Teacher</p>
  </main>
  <footer>
    <a href="https://www.linkedin.com/in/vaniacera/" rel="me noopener">LinkedIn</a>
  </footer>
</body>
</html>
